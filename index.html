<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <!-- Goole Font Link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
    rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- FOnt Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- CSS Styles -->
  <style>
    * {
      font-family: "Google Sans", sans-serif;
    }
  </style>
</head>

<body class="bg-[#F8FAFC]">
  <!-- Header Section Begins Here -->
  <header class="w-[80%] mx-auto my-16">
    <!-- Dashbord Section -->
    <h2 class="text-4xl font-bold text-[#002C5C] mb-5">Job Application Tracker</h2>
    <section class="dashbord-cards grid grid-cols-3 gap-4">
      <div class="bg-white p-5 rounded-xl">
        <p class="text-[14px] font-medium">Total</p>
        <h5 id="totalCount" class="text-2xl text-[#002C5C] font-bold">0</h5>
      </div>
      <div class="bg-white p-5 rounded-xl">
        <p class="text-[14px] font-medium">Interview</p>
        <h5 id="interviewCount" class="text-2xl text-green-500 font-bold">0</h5>
      </div>
      <div class="bg-white p-5 rounded-xl">
        <p class="text-[14px] font-medium">Rejected</p>
        <h5 id="rejectedCount" class="text-2xl text-red-500 font-bold">0</h5>
      </div>
    </section>
  </header>

  <!-- Javascript File Link -->
  <script src="js/script.js"></script>
</body>

</html>
